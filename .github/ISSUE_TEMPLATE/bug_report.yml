name: Bug report
description: Report a reproducible problem in AtlayaView
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem as concretely as possible and include enough detail to reproduce it locally.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Which exact steps trigger the issue?
      placeholder: |
        1. Start AtlayaView
        2. Open drive X:
        3. Click ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AtlayaView version
      placeholder: 2.0.15
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: dropdown
    id: variant
    attributes:
      label: Release variant
      options:
        - Full (self-contained)
        - FX (framework-dependent)
        - Built from source
        - Not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or additional context
      description: Add anything else that helps isolate the problem.
